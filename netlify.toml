# netlify.toml
# Railshop Service Starter — Netlify configuration

[build]
  base    = "web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect /index.html to root
[[redirects]]
  from   = "/index.html"
  to     = "/"
  status = 301

# SPA fallback (not needed for static, but safe to include)
[[redirects]]
  from   = "/*"
  to     = "/404/index.html"
  status = 404

# Netlify Forms — no extra config needed, forms are auto-detected
# from data-netlify="true" attributes in HTML

# Headers for performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-XSS-Protection        = "1; mode=block"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
